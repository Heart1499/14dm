<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>小雨披导演 · 泡泡模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 12px;
        }

        /* 手机容器 */
        .phone {
            max-width: 400px;
            width: 100%;
            height: 700px;
            background: #0c0c0c;
            border-radius: 38px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 8px #1a1a1a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 动态岛 */
        .dynamic-island {
            background: #111;
            width: 110px;
            height: 35px;
            margin: 12px auto 0;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .dynamic-island span {
            width: 10px;
            height: 10px;
            background: #2c2c2e;
            border-radius: 50%;
        }

        /* 聊天列表/聊天室切换 */
        .chat-tabs {
            display: flex;
            background: #1c1c1e;
            padding: 8px 16px;
            gap: 12px;
            border-bottom: 0.5px solid #2c2c2e;
        }
        .chat-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            border-radius: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .chat-tab.active {
            background: #2c2c2e;
            color: #ffffff;
        }

        /* 聊天室容器 */
        .chat-room {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0c0c0c;
        }

        /* 消息气泡 - 接收（他人发来的） */
        .message-received {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }
        .sender-name {
            font-size: 11px;
            color: #8e8e93;
            margin-bottom: 4px;
            margin-left: 8px;
        }
        .bubble-received {
            background: #1c1c1e;
            padding: 10px 14px;
            border-radius: 20px;
            border-top-left-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        .message-time {
            font-size: 9px;
            color: #5c5c5e;
            margin-top: 4px;
            margin-left: 8px;
        }

        /* 消息气泡 - 发送（导演自己） */
        .message-sent {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            max-width: 85%;
            align-self: flex-end;
        }
        .bubble-sent {
            background: #2c6b2f;
            padding: 10px 14px;
            border-radius: 20px;
            border-top-right-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        /* 特殊消息样式 */
        .photo-msg {
            background: #1c1c1e;
            padding: 8px 12px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .photo-msg span {
            font-size: 20px;
        }
        .voice-msg {
            background: #1c1c1e;
            padding: 8px 12px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .voice-msg span {
            font-size: 16px;
        }

        /* 回复输入区 */
        .reply-area {
            background: #1c1c1e;
            padding: 10px 16px;
            border-top: 0.5px solid #2c2c2e;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .reply-input {
            flex: 1;
            background: #2c2c2e;
            border: none;
            border-radius: 30px;
            padding: 10px 16px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .reply-input::placeholder {
            color: #8e8e93;
        }
        .send-btn {
            background: #2c6b2f;
            border: none;
            border-radius: 30px;
            padding: 8px 18px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .preset-btns {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            background: #1c1c1e;
            overflow-x: auto;
            border-top: 0.5px solid #2c2c2e;
        }
        .preset-btn {
            background: #2c2c2e;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            color: #ffffff;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
        }

        /* 空状态 */
        .empty-chat {
            text-align: center;
            color: #5c5c5e;
            padding: 40px 20px;
            font-size: 13px;
        }

        /* 滚动条 */
        .chat-room::-webkit-scrollbar {
            width: 4px;
        }
        .chat-room::-webkit-scrollbar-track {
            background: #1c1c1e;
        }
        .chat-room::-webkit-scrollbar-thumb {
            background: #3a3a3c;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="dynamic-island">
        <span></span><span></span><span></span>
    </div>
    <div class="chat-tabs">
        <div class="chat-tab active" data-room="fans">🎬 影迷聊天室</div>
        <div class="chat-tab" data-room="sy">🐺 申惟</div>
        <div class="chat-tab" data-room="hj">🐰 韩振</div>
    </div>
    <div id="chatContainer" class="chat-room">
        <!-- 动态渲染聊天内容 -->
    </div>
    <div class="preset-btns" id="presetBtns">
        <!-- 预设回复按钮 -->
    </div>
    <div class="reply-area">
        <input type="text" id="replyInput" class="reply-input" placeholder="输入消息...">
        <button id="sendBtn" class="send-btn">发送</button>
    </div>
</div>

<script>
    // ==================== 聊天数据（模拟泡泡风格）====================
    // 影迷群聊
    let fansMessages = [
        { sender: "粉丝A", text: "导演nim！电影拍得太好了！锐因是真的吗？", time: "10:24", type: "text" },
        { sender: "粉丝B", text: "啊啊啊1499！", time: "10:25", type: "text" },
        { sender: "粉丝C", text: "申惟耳朵红的那场戏是真情流露吧？", time: "10:27", type: "text" },
        { sender: "粉丝D", text: "导演导演，能不能多放点花絮！", time: "10:30", type: "text" },
    ];
    
    // 申惟私聊
    let syMessages = [
        { sender: "申惟", text: "导演，在忙吗", time: "09:15", type: "text" },
        { sender: "申惟", text: "嗯...没什么事", time: "09:18", type: "text" },
        { sender: "申惟", text: "今天的拍摄辛苦了", time: "12:30", type: "text" },
        { sender: "申惟", text: "（照片）", time: "14:20", type: "photo", photoDesc: "🌅 今天的天空" },
    ];
    
    // 韩振私聊
    let hjMessages = [
        { sender: "韩振", text: "导演！我今天学了新的中文", time: "08:30", type: "text" },
        { sender: "韩振", text: "你吃饭了吗～", time: "11:45", type: "text" },
        { sender: "韩振", text: "（语音消息）", time: "13:20", type: "voice", voiceLen: "0:08" },
        { sender: "韩振", text: "哥我想你了", time: "15:10", type: "text" },
    ];
    
    // 当前选中的聊天室
    let currentRoom = "fans";
    
    // 记录每个房间的消息数量（用于新消息提示，这里简单实现）
    
    // 预设回复选项（根据房间不同）
    const presetReplies = {
        fans: [
            "谢谢大家的喜欢！",
            "锐因？你们猜~",
            "花絮会考虑的",
            "1499是什么意思？",
            "会继续努力拍好作品的"
        ],
        sy: [
            "嗯，刚忙完",
            "今天表现很好",
            "发张自拍看看？",
            "辛苦了，早点休息",
            "想说什么就说吧"
        ],
        hj: [
            "学了什么中文？",
            "吃过了，你呢",
            "发语音听听",
            "我也想你",
            "在干嘛呢"
        ]
    };
    
    // 模拟收到新消息（定时器）
    let newMessageTimers = [];
    
    // 发送消息（导演回复）
    function sendMessage(text) {
        if (!text.trim()) return;
        
        // 添加导演自己的消息
        const newMsg = {
            sender: "导演",
            text: text,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            type: "text",
            isMine: true
        };
        
        if (currentRoom === "fans") {
            fansMessages.push(newMsg);
            renderChatRoom();
        } else if (currentRoom === "sy") {
            syMessages.push(newMsg);
            renderChatRoom();
            // 模拟申惟回复（延迟）
            simulateReply("sy");
        } else if (currentRoom === "hj") {
            hjMessages.push(newMsg);
            renderChatRoom();
            simulateReply("hj");
        }
        
        document.getElementById('replyInput').value = '';
        scrollToBottom();
    }
    
    // 模拟对方自动回复
    function simulateReply(room) {
        // 清除之前的定时器避免重复
        if (window.simulateTimer) clearTimeout(window.simulateTimer);
        window.simulateTimer = setTimeout(() => {
            let replyText = "";
            if (room === "sy") {
                const replies = [
                    "嗯", "知道了", "导演也是", , "我会注意的", "...好",
                    "今天状态不太好", "谢谢导演", "你也是", "晚安",
                    "（已读）"
                ];
                replyText = replies[Math.floor(Math.random() * replies.length)];
                syMessages.push({
                    sender: "申惟",
                    text: replyText,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    type: "text"
                });
            } else if (room === "hj") {
                const replies = [
                    "真的吗！", "嘿嘿", "导演你太好了", "我也觉得", "ㅋㅋㅋ",
                    "今天拍戏好累", "想你了", "下次请你吃饭", "晚安导演~",
                    "（发了一张照片）"
                ];
                replyText = replies[Math.floor(Math.random() * replies.length)];
                if (replyText.includes("照片")) {
                    hjMessages.push({
                        sender: "韩振",
                        text: "（照片）",
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        type: "photo",
                        photoDesc: "📸 刚拍的"
                    });
                } else {
                    hjMessages.push({
                        sender: "韩振",
                        text: replyText,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        type: "text"
                    });
                }
            }
            if (currentRoom === room) {
                renderChatRoom();
                scrollToBottom();
            }
        }, 1500 + Math.random() * 2000);
    }
    
    // 模拟影迷群聊随机新消息
    function simulateFanMessage() {
        if (window.fanTimer) clearTimeout(window.fanTimer);
        window.fanTimer = setTimeout(() => {
            const fanNames = ["小雨披", "雕蛙团子", "锐因研究员", "1499号", "申惟的耳朵", "韩振的围巾"];
            const messages = [
                "导演真的不考虑开直播吗",
                "啊啊啊我刚又刷了一遍电影",
                "锐因什么时候二搭",
                "导演你觉得申惟私下是什么样的",
                "韩振中文说得好好听",
                "1499锐因是真的！",
                "导演导戏的时候会觉得他们很配吗",
                "能不能出导演评论音轨",
                "我朋友看了电影也入坑了"
            ];
            const newMsg = {
                sender: fanNames[Math.floor(Math.random() * fanNames.length)],
                text: messages[Math.floor(Math.random() * messages.length)],
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                type: "text"
            };
            fansMessages.push(newMsg);
            if (currentRoom === "fans") {
                renderChatRoom();
                scrollToBottom();
            }
            simulateFanMessage(); // 继续循环
        }, 8000 + Math.random() * 7000);
    }
    
    // 渲染当前聊天室
    function renderChatRoom() {
        const container = document.getElementById('chatContainer');
        if (!container) return;
        
        let messages = [];
        let roomName = "";
        
        if (currentRoom === "fans") {
            messages = fansMessages;
            roomName = "影迷聊天室";
        } else if (currentRoom === "sy") {
            messages = syMessages;
            roomName = "申惟";
        } else if (currentRoom === "hj") {
            messages = hjMessages;
            roomName = "韩振";
        }
        
        if (messages.length === 0) {
            container.innerHTML = `<div class="empty-chat">暂无消息，发一条吧~</div>`;
            return;
        }
        
        let html = '';
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            const isMe = msg.sender === "导演" || msg.isMine === true;
            
            if (isMe) {
                // 导演自己发的消息
                html += `
                    <div class="message-sent">
                        <div class="bubble-sent">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
            } else {
                // 对方发的消息
                let contentHtml = '';
                if (msg.type === "photo") {
                    contentHtml = `<div class="photo-msg"><span>📷</span> ${escapeHtml(msg.photoDesc || '照片')}</div>`;
                } else if (msg.type === "voice") {
                    contentHtml = `<div class="voice-msg"><span>🎤</span> 语音 ${msg.voiceLen || '0:06'}</div>`;
                } else {
                    contentHtml = `<div class="bubble-received">${escapeHtml(msg.text)}</div>`;
                }
                html += `
                    <div class="message-received">
                        <div class="sender-name">${escapeHtml(msg.sender)}</div>
                        ${contentHtml}
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
            }
        }
        
        container.innerHTML = html;
        updatePresetButtons();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    function updatePresetButtons() {
        const container = document.getElementById('presetBtns');
        if (!container) return;
        
        let replies = presetReplies.fans;
        if (currentRoom === "sy") replies = presetReplies.sy;
        else if (currentRoom === "hj") replies = presetReplies.hj;
        
        container.innerHTML = '';
        replies.forEach(reply => {
            const btn = document.createElement('button');
            btn.className = 'preset-btn';
            btn.innerText = reply;
            btn.onclick = () => {
                document.getElementById('replyInput').value = reply;
                sendMessage(reply);
            };
            container.appendChild(btn);
        });
    }
    
    function scrollToBottom() {
        const container = document.getElementById('chatContainer');
        if (container) {
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 50);
        }
    }
    
    // 切换房间
    function switchRoom(room) {
        currentRoom = room;
        // 更新tab样式
        document.querySelectorAll('.chat-tab').forEach(tab => {
            if (tab.dataset.room === room) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
        renderChatRoom();
        scrollToBottom();
    }
    
    // 初始化定时器（模拟持续收到消息）
    function startMessageSimulation() {
        simulateFanMessage(); // 影迷群聊随机消息
        // 申惟和韩振的主动消息（偶尔主动发）
        setInterval(() => {
            if (currentRoom !== "sy" && Math.random() < 0.3) {
                // 后台消息也存，但不影响当前聊天体验
                const activeMessages = [
                    "导演，吃饭了吗", "今天的戏拍完了", "有点累", "明天见",
                    "晚安", "导演在吗", "没什么事"
                ];
                const newMsg = {
                    sender: "申惟",
                    text: activeMessages[Math.floor(Math.random() * activeMessages.length)],
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    type: "text"
                };
                syMessages.push(newMsg);
                if (currentRoom === "sy") {
                    renderChatRoom();
                    scrollToBottom();
                }
            }
        }, 15000);
        
        setInterval(() => {
            if (currentRoom !== "hj" && Math.random() < 0.3) {
                const activeMessages = [
                    "导演！", "在干嘛呢", "我今天学了新歌", "想你了", "晚安~",
                    "明天拍什么戏", "我有点紧张"
                ];
                const newMsg = {
                    sender: "韩振",
                    text: activeMessages[Math.floor(Math.random() * activeMessages.length)],
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    type: "text"
                };
                hjMessages.push(newMsg);
                if (currentRoom === "hj") {
                    renderChatRoom();
                    scrollToBottom();
                }
            }
        }, 12000);
    }
    
    // 绑定事件
    document.addEventListener('DOMContentLoaded', () => {
        renderChatRoom();
        
        // 绑定tab切换
        document.querySelectorAll('.chat-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                switchRoom(tab.dataset.room);
            });
        });
        
        // 发送按钮
        const sendBtn = document.getElementById('sendBtn');
        const replyInput = document.getElementById('replyInput');
        if (sendBtn) {
            sendBtn.addEventListener('click', () => {
                const text = replyInput.value.trim();
                if (text) sendMessage(text);
            });
        }
        if (replyInput) {
            replyInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = replyInput.value.trim();
                    if (text) sendMessage(text);
                }
            });
        }
        
        startMessageSimulation();
    });
</script>
</body>
</html>
