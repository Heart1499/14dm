<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>小雨披导演 · 泡泡模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 12px;
        }

        /* WVS DM 风格手机容器 */
        .phone {
            max-width: 400px;
            width: 100%;
            height: 750px;
            background: #0e0e10;
            border-radius: 38px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 8px #1c1c1e;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部状态栏 */
        .status-bar {
            background: #0e0e10;
            padding: 12px 20px 6px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        /* 聊天列表/聊天室切换 — WVS风格的tab */
        .chat-tabs {
            display: flex;
            background: #0e0e10;
            padding: 8px 16px;
            gap: 8px;
            border-bottom: 0.5px solid #2c2c2e;
        }
        .chat-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            border-radius: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .chat-tab.active {
            background: #2c2c2e;
            color: #ffffff;
        }

        /* 聊天室容器 — 模仿WVS DM消息列表 */
        .chat-room {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0e0e10;
        }

        /* 消息行 — WVS风格：头像+内容 */
        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        /* 对方头像 */
        .avatar {
            width: 36px;
            height: 36px;
            background: #2c2c2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        /* 消息内容区 */
        .message-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sender-name {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
        }
        .bubble {
            background: #1c1c1e;
            padding: 10px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            max-width: 100%;
            display: inline-block;
        }
        /* 导演自己发送的消息（右对齐，无头像） */
        .my-message {
            display: flex;
            justify-content: flex-end;
            margin: 8px 0;
        }
        .my-bubble {
            background: #2c6b2f;
            padding: 10px 14px;
            border-radius: 18px;
            border-top-right-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.4;
            max-width: 80%;
            word-break: break-word;
        }
        .message-time {
            font-size: 9px;
            color: #5c5c5e;
            margin-top: 2px;
            margin-left: 4px;
        }
        /* 照片/语音特殊样式 */
        .media-bubble {
            background: #1c1c1e;
            padding: 8px 12px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .media-bubble span {
            font-size: 20px;
        }

        /* 预设回复按钮区 */
        .preset-btns {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            background: #0e0e10;
            overflow-x: auto;
            border-top: 0.5px solid #2c2c2e;
            border-bottom: 0.5px solid #2c2c2e;
        }
        .preset-btn {
            background: #2c2c2e;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            color: #ffffff;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
        }

        /* 输入区 — WVS风格 */
        .reply-area {
            background: #0e0e10;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 0.5px solid #2c2c2e;
        }
        .reply-input {
            flex: 1;
            background: #2c2c2e;
            border: none;
            border-radius: 30px;
            padding: 10px 16px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .reply-input::placeholder {
            color: #8e8e93;
        }
        .send-btn {
            background: #2c6b2f;
            border: none;
            border-radius: 30px;
            padding: 8px 18px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .empty-chat {
            text-align: center;
            color: #5c5c5e;
            padding: 40px 20px;
            font-size: 13px;
        }

        .chat-room::-webkit-scrollbar {
            width: 4px;
        }
        .chat-room::-webkit-scrollbar-track {
            background: #1c1c1e;
        }
        .chat-room::-webkit-scrollbar-thumb {
            background: #3a3a3c;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 🔋</span>
    </div>
    <div class="chat-tabs">
        <div class="chat-tab active" data-room="fans">🎬 影迷聊天室</div>
        <div class="chat-tab" data-room="sy">🐺 申惟</div>
        <div class="chat-tab" data-room="hj">🐰 韩振</div>
    </div>
    <div id="chatContainer" class="chat-room"></div>
    <div class="preset-btns" id="presetBtns"></div>
    <div class="reply-area">
        <input type="text" id="replyInput" class="reply-input" placeholder="输入消息...">
        <button id="sendBtn" class="send-btn">发送</button>
    </div>
</div>

<script>
    // ==================== WVS风格 聊天数据 ====================
    // 影迷群聊（持续滚动消息）
    let fansMessages = [
        { sender: "🍿 电影迷", text: "导演nim！新剧什么时候播？", time: "10:24", type: "text", avatar: "🎬" },
        { sender: "🦒 长颈鹿饲养员", text: "申惟那个回眸我看了100遍...", time: "10:25", type: "text", avatar: "🦒" },
        { sender: "🐰 兔子饲养员", text: "韩振的中文台词好苏啊", time: "10:27", type: "text", avatar: "🐰" },
        { sender: "📽️ 胶片机", text: "导演导戏的时候在想什么？", time: "10:30", type: "text", avatar: "🎞️" },
    ];
    
    // 申惟私聊（话少、克制）
    let syMessages = [
        { sender: "申惟", text: "导演，刚看完剧本", time: "09:15", type: "text", avatar: "🐺" },
        { sender: "申惟", text: "有一段戏我不太明白", time: "09:18", type: "text", avatar: "🐺" },
        { sender: "申惟", text: "（照片）", time: "14:20", type: "photo", photoDesc: "📖 剧本批注", avatar: "🐺" },
    ];
    
    // 韩振私聊（话多、活泼）
    let hjMessages = [
        { sender: "韩振", text: "导演！今天拍戏状态好好", time: "08:30", type: "text", avatar: "🐰" },
        { sender: "韩振", text: "（语音消息）", time: "13:20", type: "voice", voiceLen: "0:08", avatar: "🐰" },
        { sender: "韩振", text: "导演晚安～～", time: "22:15", type: "text", avatar: "🐰" },
    ];
    
    // 狗血红果短剧剧情索引
    const dramaEvents = [
        "【红果短剧预告】申惟和韩振的新剧《致命契约》下周上线！",
        "【红果短剧花絮】申惟拍吻戏耳朵红透，韩振笑着帮他扇风",
        "【红果短剧路透】两人在雨中拉扯的戏份拍了八条，导演喊卡时两人都哭了",
        "【红果短剧】韩振用中文说“你欠我的这辈子都还不清”，申惟接“那就下辈子继续还”",
        "【红果短剧】导演透露结局是开放式的，粉丝已经在猜了",
    ];
    let dramaIndex = 0;
    
    let currentRoom = "fans";
    let simulateTimer = null;
    let fansTimer = null;
    
    // 预设回复选项（WVS风格）
    const presetReplies = {
        fans: [
            "谢谢支持！",
            "剧透一点点？不行～",
            "花絮会多放的",
            "他们很敬业",
            "结局你们猜"
        ],
        sy: [
            "嗯，哪一段？",
            "发给我看看",
            "慢慢来，不着急",
            "今天辛苦了",
            "相信你可以的"
        ],
        hj: [
            "今天状态确实好",
            "发语音听听",
            "早点休息",
            "我也觉得",
            "继续保持"
        ]
    };
    
    // 影迷随机消息池（像真实泡泡一样）
    const fanMessagePool = [
        { sender: "🎬 电影迷", text: "导演！红果短剧什么时候播？", avatar: "🎬" },
        { sender: "🦒 长颈鹿饲养员", text: "申惟那个眼神杀我", avatar: "🦒" },
        { sender: "🐰 兔子饲养员", text: "韩振说中文好可爱", avatar: "🐰" },
        { sender: "📽️ 胶片机", text: "导演导戏的时候好帅", avatar: "🎞️" },
        { sender: "🍿 爆米花", text: "1499！锐因是真的", avatar: "🍿" },
        { sender: "🎭 戏剧迷", text: "他俩的对手戏火花四溅", avatar: "🎭" },
        { sender: "📸 站姐", text: "导演多发点剧照吧求求了", avatar: "📸" },
        { sender: "🌟 星光", text: "申惟的眼泪戏太绝了", avatar: "🌟" },
        { sender: "🌸 花瓣", text: "韩振是不是真的入戏了", avatar: "🌸" },
        { sender: "🎵 OST", text: "主题曲谁唱啊导演", avatar: "🎵" },
    ];
    
    function getCurrentTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // 发送红果短剧相关剧情到影迷聊天室（模拟剧宣）
    function pushDramaNews() {
        const dramaMsg = {
            sender: "🎬 红果短剧官方",
            text: dramaEvents[dramaIndex % dramaEvents.length],
            time: getCurrentTime(),
            type: "text",
            avatar: "🍎"
        };
        fansMessages.push(dramaMsg);
        dramaIndex++;
        if (currentRoom === "fans") {
            renderChatRoom();
            scrollToBottom();
        }
        // 每隔几分钟推送一条新剧讯
        setTimeout(pushDramaNews, 45000 + Math.random() * 30000);
    }
    
    // 影迷聊天室持续滚动新消息
    function startFanMessagesLoop() {
        if (fansTimer) clearInterval(fansTimer);
        fansTimer = setInterval(() => {
            const randomMsg = fanMessagePool[Math.floor(Math.random() * fanMessagePool.length)];
            const newMsg = {
                sender: randomMsg.sender,
                text: randomMsg.text,
                time: getCurrentTime(),
                type: "text",
                avatar: randomMsg.avatar
            };
            fansMessages.push(newMsg);
            if (currentRoom === "fans") {
                renderChatRoom();
                scrollToBottom();
            }
            // 控制消息条数过多时清理
            if (fansMessages.length > 80) {
                fansMessages = fansMessages.slice(-60);
            }
        }, 6000 + Math.random() * 5000);
    }
    
    // 申惟和韩振的主动消息（无发错人情节）
    function startActorMessages() {
        setInterval(() => {
            if (currentRoom !== "sy") {
                const syMsgs = [
                    "导演，明天几点拍摄？",
                    "今天辛苦了",
                    "我看了剪辑版，挺好",
                    "（照片）",
                    "晚安",
                    "有点紧张明天的戏"
                ];
                const choice = syMsgs[Math.floor(Math.random() * syMsgs.length)];
                if (choice.includes("照片")) {
                    syMessages.push({
                        sender: "申惟",
                        text: "（照片）",
                        time: getCurrentTime(),
                        type: "photo",
                        photoDesc: "📷 练习室",
                        avatar: "🐺"
                    });
                } else {
                    syMessages.push({
                        sender: "申惟",
                        text: choice,
                        time: getCurrentTime(),
                        type: "text",
                        avatar: "🐺"
                    });
                }
                if (currentRoom === "sy") {
                    renderChatRoom();
                    scrollToBottom();
                }
            }
        }, 18000);
        
        setInterval(() => {
            if (currentRoom !== "hj") {
                const hjMsgs = [
                    "导演！我今天学了新中文",
                    "（语音消息）",
                    "想你了～～",
                    "今天拍戏好开心",
                    "导演吃饭了吗",
                    "晚安导演"
                ];
                const choice = hjMsgs[Math.floor(Math.random() * hjMsgs.length)];
                if (choice.includes("语音")) {
                    hjMessages.push({
                        sender: "韩振",
                        text: "（语音消息）",
                        time: getCurrentTime(),
                        type: "voice",
                        voiceLen: "0:06",
                        avatar: "🐰"
                    });
                } else {
                    hjMessages.push({
                        sender: "韩振",
                        text: choice,
                        time: getCurrentTime(),
                        type: "text",
                        avatar: "🐰"
                    });
                }
                if (currentRoom === "hj") {
                    renderChatRoom();
                    scrollToBottom();
                }
            }
        }, 15000);
    }
    
    // 发送消息（导演回复）
    function sendMessage(text) {
        if (!text.trim()) return;
        const myMsg = {
            text: text,
            time: getCurrentTime(),
            isMine: true
        };
        
        if (currentRoom === "fans") {
            fansMessages.push({ ...myMsg, sender: "导演", type: "text" });
            renderChatRoom();
            // 影迷可能会继续回复（但不用额外逻辑，已有定时器）
        } else if (currentRoom === "sy") {
            syMessages.push({ ...myMsg, sender: "导演", type: "text" });
            renderChatRoom();
            simulateSyReply();
        } else if (currentRoom === "hj") {
            hjMessages.push({ ...myMsg, sender: "导演", type: "text" });
            renderChatRoom();
            simulateHjReply();
        }
        document.getElementById('replyInput').value = '';
        scrollToBottom();
    }
    
    // 模拟申惟回复（人设克制、回应简洁）
    function simulateSyReply() {
        if (simulateTimer) clearTimeout(simulateTimer);
        simulateTimer = setTimeout(() => {
            const replies = [
                "嗯", "知道了", "好的", "...", "谢谢导演",
                "明白了", "我会注意", "导演也是", "晚安"
            ];
            const replyText = replies[Math.floor(Math.random() * replies.length)];
            syMessages.push({
                sender: "申惟",
                text: replyText,
                time: getCurrentTime(),
                type: "text",
                avatar: "🐺"
            });
            if (currentRoom === "sy") {
                renderChatRoom();
                scrollToBottom();
            }
        }, 1500 + Math.random() * 1500);
    }
    
    // 模拟韩振回复（活泼、话多）
    function simulateHjReply() {
        if (simulateTimer) clearTimeout(simulateTimer);
        simulateTimer = setTimeout(() => {
            const replies = [
                "真的吗！", "嘿嘿", "导演你太好了", "我也觉得", "ㅋㅋㅋ",
                "今天好开心", "收到！", "晚安导演～", "明天见"
            ];
            const replyText = replies[Math.floor(Math.random() * replies.length)];
            hjMessages.push({
                sender: "韩振",
                text: replyText,
                time: getCurrentTime(),
                type: "text",
                avatar: "🐰"
            });
            if (currentRoom === "hj") {
                renderChatRoom();
                scrollToBottom();
            }
        }, 1200 + Math.random() * 1800);
    }
    
    // 渲染WVS风格聊天室
    function renderChatRoom() {
        const container = document.getElementById('chatContainer');
        if (!container) return;
        
        let messages = [];
        if (currentRoom === "fans") messages = fansMessages;
        else if (currentRoom === "sy") messages = syMessages;
        else messages = hjMessages;
        
        if (messages.length === 0) {
            container.innerHTML = `<div class="empty-chat">暂无消息，发一条吧~</div>`;
            updatePresetButtons();
            return;
        }
        
        let html = '';
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            // 判断是否为自己发送的消息（导演发送的没有头像、右对齐）
            if (msg.sender === "导演" || msg.isMine === true) {
                html += `
                    <div class="my-message">
                        <div class="my-bubble">${escapeHtml(msg.text)}</div>
                    </div>
                    <div class="message-time" style="text-align: right; margin-right: 8px;">${msg.time}</div>
                `;
            } else {
                // 对方消息：显示头像 + 气泡
                let contentHtml = '';
                if (msg.type === "photo") {
                    contentHtml = `<div class="media-bubble"><span>📷</span> ${escapeHtml(msg.photoDesc || '照片')}</div>`;
                } else if (msg.type === "voice") {
                    contentHtml = `<div class="media-bubble"><span>🎤</span> 语音 ${msg.voiceLen || '0:06'}</div>`;
                } else {
                    contentHtml = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
                }
                html += `
                    <div class="message-row">
                        <div class="avatar">${msg.avatar || (msg.sender === '申惟' ? '🐺' : '🐰')}</div>
                        <div class="message-content">
                            <div class="sender-name">${escapeHtml(msg.sender)}</div>
                            ${contentHtml}
                            <div class="message-time">${msg.time}</div>
                        </div>
                    </div>
                `;
            }
        }
        container.innerHTML = html;
        updatePresetButtons();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function updatePresetButtons() {
        const container = document.getElementById('presetBtns');
        if (!container) return;
        let replies = presetReplies.fans;
        if (currentRoom === "sy") replies = presetReplies.sy;
        else if (currentRoom === "hj") replies = presetReplies.hj;
        
        container.innerHTML = '';
        replies.forEach(reply => {
            const btn = document.createElement('button');
            btn.className = 'preset-btn';
            btn.innerText = reply;
            btn.onclick = () => {
                document.getElementById('replyInput').value = reply;
                sendMessage(reply);
            };
            container.appendChild(btn);
        });
    }
    
    function scrollToBottom() {
        const container = document.getElementById('chatContainer');
        if (container) {
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 50);
        }
    }
    
    function switchRoom(room) {
        currentRoom = room;
        document.querySelectorAll('.chat-tab').forEach(tab => {
            if (tab.dataset.room === room) tab.classList.add('active');
            else tab.classList.remove('active');
        });
        renderChatRoom();
        scrollToBottom();
    }
    
    // 清理之前的定时器
    function clearAllTimers() {
        if (fansTimer) clearInterval(fansTimer);
        if (simulateTimer) clearTimeout(simulateTimer);
    }
    
    // 初始化
    function init() {
        clearAllTimers();
        startFanMessagesLoop();
        startActorMessages();
        // 红果短剧剧情消息
        setTimeout(pushDramaNews, 5000);
        
        renderChatRoom();
        
        document.querySelectorAll('.chat-tab').forEach(tab => {
            tab.addEventListener('click', () => switchRoom(tab.dataset.room));
        });
        
        const sendBtn = document.getElementById('sendBtn');
        const replyInput = document.getElementById('replyInput');
        if (sendBtn) {
            sendBtn.addEventListener('click', () => {
                const text = replyInput.value.trim();
                if (text) sendMessage(text);
            });
        }
        if (replyInput) {
            replyInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = replyInput.value.trim();
                    if (text) sendMessage(text);
                }
            });
        }
    }
    
    init();
</script>
</body>
</html>
