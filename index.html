    const emotes = ["😭💕", "🤍", "🐰💖", "✨✨", "🔥", "💎", "🌸", "🥺👉👈", "😍🔥", "🎀", "🎤", "💥", "💫"];
    
    function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }
    
    function getRandomTime() {
        const now = new Date();
        const minutesAgo = Math.floor(Math.random() * 10);
        const date = new Date(now.getTime() - minutesAgo * 60 * 1000);
        return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }
    
    function generateRandomFanMessage() {
        let base = randomItem(fanMessageBank);
        if (Math.random() > 0.7) base += " " + randomItem(emotes);
        if (Math.random() > 0.8) base += "!!!";
        return base;
    }
    
    function getRandomFanName() {
        return randomItem(fanNamesPool);
    }
    
    // 全局数据
    let messages = [];          // 存储消息 { id, type, senderName, content, time }

    let bombIntervalId = null;
    let isBombActive = true;     // 粉丝轰炸持续开启

    const idolNameSpan = document.getElementById('idolNameDisplay');
    const editNameBtn = document.getElementById('editNameBtn');
    const avatarEmoji = document.getElementById('avatarEmoji');
    
    // 辅助函数
    function scrollToBottom() {
        if (chatContainer) {
            chatContainer.scrollTop = chatContainer.scrollHeight;
            autoScrollEnabled = true;
            if (scrollBtn) scrollBtn.style.display = 'none';
        }
    }
    
    function renderMessages() {
        const existingMessages = chatContainer.querySelectorAll('.message:not(.placeholder-only)');
        existingMessages.forEach(node => node.remove());
        
        if (messages.length === 0) {
            emptyPlaceholder.style.display = 'block';
            return;
        }
        emptyPlaceholder.style.display = 'none';
        
        messages.forEach(msg => {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', msg.type === 'fan' ? 'fan' : 'idol');
            messageDiv.setAttribute('data-id', msg.id);
            
            const nameSpan = document.createElement('div');
            nameSpan.classList.add('message-name');
            nameSpan.textContent = msg.senderName;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.classList.add('bubble');
            bubbleDiv.textContent = msg.content;
            
            const timeSpan = document.createElement('div');
            timeSpan.classList.add('time-stamp');
            timeSpan.textContent = msg.time;
            
            messageDiv.appendChild(nameSpan);
            messageDiv.appendChild(bubbleDiv);
            messageDiv.appendChild(timeSpan);
            chatContainer.appendChild(messageDiv);
        });
        
        if (autoScrollEnabled) {
            scrollToBottom();
        } else {
            if (messages.length > 0 && scrollBtn) scrollBtn.style.display = 'flex';
        }
    }
    
    function addMessage(type, senderName, content, time = null) {
        const newMsg = {
            id: Date.now() + Math.random() * 10000 + Math.random(),
            type: type,   // 'fan' or 'idol'
            senderName: senderName,
            content: content,
            time: time || getRandomTime()
        };
        messages.push(newMsg);
        renderMessages();
        
        if (!autoScrollEnabled && scrollBtn) scrollBtn.style.display = 'flex';
        
        // 微震动
        if (navigator.vibrate) navigator.vibrate(30);
    }

            const delay = Math.random() * 1300 + 400;  // 0.4~1.7秒一条，轰炸感

                if (!isBombActive) return;
                const randomFan = getRandomFanName();
                const randomMsg = generateRandomFanMessage();
                addMessage('fan', randomFan, randomMsg);

                if (Math.random() > 0.75 && messages.length < 300) {
                    setTimeout(() => {
                        if (isBombActive) {
                            const extraFan = getRandomFanName();
                            const extraMsg = generateRandomFanMessage();
                            addMessage('fan', extraFan, extraMsg);
                        }
                    }, 120);
                }
                if (Math.random() > 0.9 && messages.length < 300) {
                    setTimeout(() => {
                        if (isBombActive) {
                            const tripleFan = getRandomFanName();
                            const tripleMsg = generateRandomFanMessage() + " 💥💥";

            `💌 나도 너의 팬이야~~~`

        // 根据爱豆消息内容动态增加一些自定义回复
        let customReplies = [];
        if (idolMessageContent.includes("사랑") || idolMessageContent.includes("❤️") || idolMessageContent.includes("love")) {
            customReplies = ["❤️🧡💛 우리도 사랑해요!!!", "💕 사랑은 영원하다", "😭❤️ 너무 달달해"];
        }

            delay += Math.random() * 180 + 60;  // 60~240ms递增，快速涌入
        }
        // 额外再最后引发一次小高潮 再过0.6秒后追加 3条额外狂热
        setTimeout(() => {

                    if (isBombActive) {
                        const fanExtra = getRandomFanName();
                        const exciteMsg = randomItem(["🔥🔥🔥 대박", "💥💥💥 아이돌 최고", "🎉🎉🎉 축하해요", "💖💖💖 사랑해", "🐰🐰❤️❤️"]);
                        addMessage('fan', fanExtra, exciteMsg);
                    }
                }, i * 150);
            }
        }, 400);
    }
    
    // 发送爱豆消息 (自己)
    function sendIdolMessage(content) {
        if (!content.trim()) return;
        const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        addMessage('idol', idolName, content.trim(), currentTime);
        // 清空输入框
        messageInput.value = '';
        // 一呼百应：粉丝们集体响应轰炸！！！
        oneCallManyResponse(content.trim());
        // 附加额外: 爱豆发送消息后由于人气，短期增加后台轰炸密度, 但原轰炸持续已有, 无需额外，但为了效果，可额外触发一轮快速高响应
        // 再手动快速调一点模拟
        setTimeout(() => {
            if (isBombActive) {
                for(let i=0;i<3;i++) {
                    setTimeout(() => {
                        const rushFan = getRandomFanName();
                        const rushMsg = randomItem(["🔥🔥 바로 일어났어요!", "✨响应召唤✨", "❤️❤️❤️❤️", "대박 사건❤️"]);
                        addMessage('fan', rushFan, rushMsg);
                    }, i*80);
                }
            }
        }, 200);
    }
    
    // 显示toast
    function showToast(text) {
        const existingToast = document.querySelector('.toast-message');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = text;
        document.querySelector('.phone').appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // 设置爱豆名字
    function setIdolName(newName) {
        if (newName && newName.trim() !== "") {
            idolName = newName.trim();
            idolNameSpan.innerText = idolName;
            // 可选改avatar
            if(idolName.includes("🐰") || idolName.includes("토끼")) avatarEmoji.innerText = "🐰";
            else if(idolName.includes("🐱") || idolName.includes("고양이")) avatarEmoji.innerText = "🐱";
            else if(idolName.includes("🌟")) avatarEmoji.innerText = "🌟";
            else avatarEmoji.innerText = "⭐️";
            showToast(`✨ 이름이 "${idolName}"(으)로 변경되었습니다 ✨`);
        } else {
            showToast("이름을 입력해주세요!");
        }
    }
    
    // 编辑名字弹窗 (仿iOS风格)
    function promptEditName() {
        let newName = prompt("✨ 아티스트 이름을 설정하세요 ✨\n(예: 지민, 카리나, 해찬...)", idolName);
        if (newName !== null && newName.trim() !== "") {
            setIdolName(newName);
        } else if (newName !== null && newName.trim() === "") {
            showToast("이름을 입력해주세요!");
        }
    }
    
    // 滚动监听
    function bindScrollEvents() {
        if (!chatContainer) return;
        chatContainer.addEventListener('scroll', () => {
            const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop <= chatContainer.clientHeight + 60;
            if (isAtBottom) {
                autoScrollEnabled = true;
                if (scrollBtn) scrollBtn.style.display = 'none';
            } else {
                if (autoScrollEnabled === true) autoScrollEnabled = false;
                if (scrollBtn && messages.length > 0) scrollBtn.style.display = 'flex';
            }
        });
    }
    
    // 清理旧消息限制（性能优化）
    function maintainMessageLimit() {
        setInterval(() => {
            if (messages.length > 280) {
                messages = messages.slice(-240);
                renderMessages();
                if (!autoScrollEnabled) {
                    // 保留滚动位置体验
                }
            }
        }, 12000);
    }
    
    // 初次引导消息（让界面热闹）
    function initialFloodMessages() {
        setTimeout(() => {
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    if (isBombActive) {
                        const initFan = getRandomFanName();
                        const initMsg = randomItem(["💖 안녕하세요! 아이돌님!", "🌸 데뷔 축하해요!!", "✨ 팬이에요 사랑해요", "🔥 대박나세요!!", "❤️ DM 열렸다!!", "🐰 첫 응원 왔어요"]);
                        addMessage('fan', initFan, initMsg);
                    }
                }, i * 240);
            }
        }, 300);
    }
    
    // 初始化
    function init() {
        bindScrollEvents();
        startFanBombardment();
        maintainMessageLimit();
        initialFloodMessages();
        
        // 发送事件绑定
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value;
            if (text.trim()) {
                sendIdolMessage(text);
            } else {
                showToast("메시지를 입력하세요!");
            }
        });
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const text = messageInput.value;
                if (text.trim()) sendIdolMessage(text);
            }
        });
        editNameBtn.addEventListener('click', promptEditName);
        scrollBtn.addEventListener('click', () => {
            scrollToBottom();
            autoScrollEnabled = true;
            scrollBtn.style.display = 'none';
        });
        
        // 返回按钮只是美化装饰
        const backBtn = document.querySelector('.back-btn');
        if(backBtn) backBtn.addEventListener('click', () => showToast("💌 WVS DM 一呼百应 모드 💌"));
        
        // 默认初始IDOL名字
        setIdolName("🐰 윈터 🎀");
    }
    
    init();
</script>
</body>
</html>
