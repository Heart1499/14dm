        if (bubbleWrapper) {

    }
    
    function addMessage(type, senderName, content, time = null) {
        const newMsg = {
            id: Date.now() + Math.random() * 10000 + Math.random(),
            type: type,
            senderName: senderName,
            content: content,
            time: time || getRandomTime()
        };
        messages.push(newMsg);
        renderMessages();
        if (!autoScrollEnabled && scrollBtn) scrollBtn.style.display = 'flex';
        if (navigator.vibrate) navigator.vibrate(20);
    }
    
    // 一呼百应 - 粉丝大反应 (爱豆发送后触发大量回应，包含针对爱豆消息的智能反应)
    function oneCallManyResponse(idolMessageContent) {
        const responseCount = Math.floor(Math.random() * 14) + 10;  // 10~24条，更加轰炸
        showToast(`✨ 一呼百应！ ${responseCount}位粉丝热情回应 ✨`);
        
        // 根据爱豆消息内容生成关联回应 (中韩混用加强真实感)
        let relatedReplies = [];
        const msgLower = idolMessageContent.toLowerCase();
        if (msgLower.includes('사랑') || msgLower.includes('❤️') || msgLower.includes('love') || msgLower.includes('爱')) {
            relatedReplies = ["❤️🧡💛 우리도 사랑해요!!!", "💕 사랑은 영원하다", "😭❤️ 너무 달달해", "❤️ 역시 우리 아이돌 사랑해요", "💖 팬들도 당신을 사랑해요"];
        }
        if (msgLower.includes('고마워') || msgLower.includes('감사') || msgLower.includes('谢谢')) {
            relatedReplies = ["😭 항상 고마워요! 우리가 더 감사해", "❤️ 언니가 있어서 행복해요", "🙏 감사합니다 아이돌님", "🌟 항상 감사드려요 사랑해요"];
        }
        if (msgLower.includes('힘내') || msgLower.includes('화이팅') || msgLower.includes('加油')) {
            relatedReplies = ["💪💪 우리 같이 힘내요!!", "🔥🔥 오늘도 힘내세요!", "🙌 응원합니다!!", "💪 팬도 힘낼게요!"];
        }
        if (msgLower.includes('보고싶어') || msgLower.includes('미안') || msgLower.includes('想见')) {
            relatedReplies = ["😭 저도 보고싶어요!", "🌸 얼른 만나요!!", "💖 보고싶어 죽겠다", "🥺 언제와요? 보고파"];
        }
        const defaultReplies = [
            `😭❤️ "${idolMessageContent}" 너무 멋져요!!`,
            `✨ 언니/오빠 말 대박 공감!`,
            `💎 나도 그래!!! 완전 짱👏`,
            `🌸 맞아요 ㅠㅠ 감동이에요`,
            `🔥🔥🔥 아이돌 최고!`,
            `📣 우리 영원히 함께해요`,
            `🐰♥️ 최고다 최고!`,
            `💬 정말 멋진 말씀✨`,
            `🎀 덕분에 힘내요!`
        ];
        const allReplies = [...defaultReplies, ...relatedReplies];
        
        let delay = 0;
        for (let i = 0; i < responseCount; i++) {
            setTimeout(() => {
                if (!isBombActive) return;
                let replyMsg;
                if (Math.random() > 0.3) {
                    replyMsg = randomItem(allReplies);
                } else {
                    replyMsg = generateRandomFanMessage();
                }
                const randomFan = getRandomFanName();
                addMessage('fan', randomFan, replyMsg);
            }, delay);
            delay += Math.random() * 160 + 50;
        }
        // 额外再补一波狂热高潮
        setTimeout(() => {
            for (let i=0; i<4; i++) {
                setTimeout(() => {
                    if (isBombActive) {
                        const fanExtra = getRandomFanName();
                        const exciteMsg = randomItem(["🔥🔥🔥 대박 이벤트", "💥💥💥 아이돌 짱", "🎉🎉🎉 축하해요", "💖💖💖 사랑해", "🐰🐰❤️❤️", "✨✨ 일확천다 ✨✨"]);
                        addMessage('fan', fanExtra, exciteMsg);
                    }
                }, i * 180);
            }
        }, 500);
    }
    
    function sendIdolMessage(content) {
        if (!content.trim()) return;
        const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        addMessage('idol', idolName, content.trim(), currentTime);
        messageInput.value = '';
        // 一呼百应核心
        oneCallManyResponse(content.trim());
        // 追加瞬间爆发感
        setTimeout(() => {
            if (isBombActive) {
                for(let i=0;i<4;i++) {
                    setTimeout(() => {
                        const rushFan = getRandomFanName();
                        const rushMsg = randomItem(["🔥 바로 응답!","✨召唤响应✨","❤️❤️❤️❤️","대박 사건❤️","💌 아이돌 메시지💌"]);
                        addMessage('fan', rushFan, rushMsg);
                    }, i*70);
                }
            }
        }, 150);
    }
    
    function showToast(text) {
        const existingToast = document.querySelector('.toast-message');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = text;
        document.querySelector('.phone').appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function setIdolName(newName) {
        if (newName && newName.trim() !== "") {
            idolName = newName.trim();
            idolNameSpan.innerText = idolName;
            if(idolName.includes("🐰") || idolName.includes("토끼")) avatarEmoji.innerText = "🐰";
            else if(idolName.includes("🐱") || idolName.includes("고양이")) avatarEmoji.innerText = "🐱";
            else if(idolName.includes("🌟")) avatarEmoji.innerText = "🌟";
            else avatarEmoji.innerText = "⭐️";
            showToast(`✨ 名字变更为 "${idolName}" ✨`);
        } else {
            showToast("请输入名字!");
        }
    }
    
    function promptEditName() {
        let newName = prompt("✨ 设置爱豆名字 ✨\n(例: Karina, Winter, 지민)", idolName);
        if (newName !== null && newName.trim() !== "") {
            setIdolName(newName);
        } else if (newName !== null) {
            showToast("名字不能为空!");
        }
    }
    
    function bindScrollEvents() {
        if (!chatContainer) return;
        chatContainer.addEventListener('scroll', () => {
            const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop <= chatContainer.clientHeight + 60;
            if (isAtBottom) {
                autoScrollEnabled = true;
                if (scrollBtn) scrollBtn.style.display = 'none';
            } else {
                if (autoScrollEnabled === true) autoScrollEnabled = false;
                if (scrollBtn && messages.length > 0) scrollBtn.style.display = 'flex';
            }
        });
    }
    
    function startFanBombardment() {
        function fanLoop() {
            if (!isBombActive) return;
            const delay = Math.random() * 1200 + 450;
            setTimeout(() => {
                if (!isBombActive) return;
                const randomFan = getRandomFanName();
                const randomMsg = generateRandomFanMessage();
                addMessage('fan', randomFan, randomMsg);
                if (Math.random() > 0.75 && messages.length < 350) {
                    setTimeout(() => {
                        if (isBombActive) addMessage('fan', getRandomFanName(), generateRandomFanMessage());
                    }, 100);
                }
                fanLoop();
            }, delay);
        }
        fanLoop();
        setInterval(() => {
            if (isBombActive && messages.length < 400) {
                addMessage('fan', getRandomFanName(), randomItem(["🎤 라이브 기대해요!!", "📸 셀카 주세요 ❤️", "🌙 항상 응원합니다", "✨✨✨✨", "💌 DM 사랑해요"]));
            }
        }, 5800);
    }
    
    function maintainMessageLimit() {
        setInterval(() => {
            if (messages.length > 300) messages = messages.slice(-260);
            renderMessages();
        }, 15000);
    }
    
    function initialFlood() {
        setTimeout(() => {
            for (let i=0;i<5;i++) {
                setTimeout(() => {
                    if (isBombActive) addMessage('fan', getRandomFanName(), randomItem(["💖 안녕하세요!", "🌸 데뷔 축하", "✨ 팬이에요", "🔥 응원합니다", "❤️ DM 왔어요"]));
                }, i*220);
            }
        }, 400);
    }
    
    function init() {
        bindScrollEvents();
        startFanBombardment();
        maintainMessageLimit();
        initialFlood();
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value;
            if (text.trim()) sendIdolMessage(text);
            else showToast("메시지를 입력하세요!");
        });
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const text = messageInput.value;
                if (text.trim()) sendIdolMessage(text);
            }
        });
        editNameBtn.addEventListener('click', promptEditName);
        scrollBtn.addEventListener('click', () => {
            scrollToBottom();
            autoScrollEnabled = true;
            scrollBtn.style.display = 'none';
        });
        document.querySelector('.back-btn')?.addEventListener('click', () => showToast("💌 WVS DM 一呼百应 💌"));
        setIdolName("🐰 카리나");
    }
    init();
</script>
</body>
</html>
